<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Capacitación Primadera</title>
    <style>
        :root { --red: #9C1519; --grey: #605F5F; --light: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); padding: 15px; display: flex; justify-content: center; }
        .card { max-width: 450px; width: 100%; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 6px solid var(--red); }
        h2 { text-align: center; color: var(--red); margin-bottom: 15px; font-size: 1.3rem; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 0.8rem; color: #444; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        
        /* Estilos Calificación Experiencia */
        .rating-box { display: flex; justify-content: space-around; background: #fafafa; padding: 10px; border-radius: 10px; border: 1px solid #eee; }
        .face { font-size: 2.2rem; cursor: pointer; color: #ccc; transition: 0.3s; filter: grayscale(1); opacity: 0.5; }
        .face.active { color: var(--red); filter: grayscale(0); transform: scale(1.2); opacity: 1; }

        /* Estilos Autonomía (Semáforo) */
        .efectividad-group { display: flex; flex-direction: column; gap: 8px; margin-top: 5px; }
        .btn-efect { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 8px; background: white; cursor: pointer; font-size: 0.85rem; font-weight: bold; color: var(--grey); transition: 0.3s; text-align: left; }
        .btn-efect.active { transform: translateX(5px); }

        .camera-container { width: 100%; min-height: 220px; background: #000; border-radius: 8px; margin-top: 15px; overflow: hidden; }
        video, img { width: 100%; height: 220px; object-fit: cover; }
        .btn-main { background: var(--red); color: white; width: 100%; padding: 18px; border: none; border-radius: 10px; cursor: pointer; margin-top: 25px; font-weight: bold; font-size: 1.1rem; }
        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-group { display: flex; justify-content: space-between; margin-top: 10px; }
        .btn-sec { background: var(--grey); color: white; padding: 12px; border: none; border-radius: 8px; width: 48%; font-size: 0.8rem; cursor: pointer; }
        #status { text-align: center; margin-top: 10px; font-size: 0.8rem; color: var(--grey); font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Registro Primadera</h2>
    
    <label>Línea / Área</label>
    <select id="linea">
        <option value="Vecoplan">Vecoplan</option>
        <option value="Hacker">Hacker</option>
        <option value="Cargador">Cargador</option>
        <option value="Molinos">Molinos</option>
        <option value="Afilado">Afilado</option>
        <option value="Secador">Secador</option>
        <option value="Cocinas">Cocinas</option>
        <option value="Ferrocontrol SHS">Ferrocontrol SHS</option>
        <option value="Contiroll">Contiroll</option>
        <option value="Finalizado">Finalizado</option>
        <option value="Laminado 1">Laminado 1</option>
        <option value="Laminado 2">Laminado 2</option>
        <option value="Logistica">Logística</option>
        <option value="Administrativo">Administrativo</option>
    </select>

    <div style="display: flex; gap: 10px;">
        <div style="flex: 2;">
            <label>Colaborador</label>
            <input type="text" id="colaborador" placeholder="Nombre completo">
        </div>
        <div style="flex: 1;">
            <label>Cédula</label>
            <input type="text" id="codigo" placeholder="Documento">
        </div>
    </div>

    <label>Instructor / Formador</label>
    <input type="text" id="instructor" placeholder="Nombre del facilitador">

    <label>Tema de Capacitación</label>
    <textarea id="tema" rows="2" placeholder="Describa el tema tratado"></textarea>

    <label>Duración (minutos)</label>
    <input type="number" id="tiempo" placeholder="Ej: 30">

    <label style="text-align: center; margin-top: 20px;">¿Cómo fue tu experiencia en la capacitación? (metodología, facilitador y espacio)</label>
    <div class="rating-box">
        <span class="face" onclick="setRating(1, this)">😞</span>
        <span class="face" onclick="setRating(2, this)">😐</span>
        <span class="face" onclick="setRating(3, this)">🙂</span>
        <span class="face" onclick="setRating(4, this)">😊</span>
        <span class="face active" onclick="setRating(5, this)">🤩</span>
    </div>

    <label style="text-align: center; margin-top: 20px;">¿Qué tan preparado te sientes para aplicar este conocimiento?</label>
    <div class="efectividad-group">
        <button type="button" class="btn-efect" data-val="1" onclick="setEfect(1, this)">Aún no me siento preparado</button>
        <button type="button" class="btn-efect" data-val="2" onclick="setEfect(2, this)">Necesito apoyo para aplicarlo</button>
        <button type="button" class="btn-efect" data-val="3" onclick="setEfect(3, this)">Puedo aplicarlo con supervisión</button>
        <button type="button" class="btn-efect active" data-val="4" onclick="setEfect(4, this)" id="btnListoDef">Puedo aplicarlo de forma autónoma</button>
    </div>

    <div class="camera-container">
        <video id="video" autoplay playsinline muted></video>
        <img id="preview" style="display:none;">
    </div>
    
    <div class="btn-group">
        <button class="btn-sec" onclick="capturar()">📸 Tomar Foto</button>
        <button class="btn-sec" onclick="document.getElementById('file').click()">📁 Galería</button>
    </div>
    <input type="file" id="file" accept="image/*" style="display:none;" onchange="cargarImagen(event)">

    <button class="btn-main" id="btnEnviar" onclick="enviar()">GUARDAR REGISTRO</button>
    <div id="status">Cámara activa</div>
</div>

<script>
    const video = document.getElementById('video');
    const preview = document.getElementById('preview');
    const btnEnviar = document.getElementById('btnEnviar');
    const statusText = document.getElementById('status');
    const flowURL = 'https://defaultdecef567e05041b8aa8b4dbaa95c2a.50.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/71551438701e4d9088bffb9bef021ec3/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=z7oUknLPXDvRKoFES6L_vZ4B6zbrLHgw9r7QoYdGrgI';
    
    let imagenB64 = "";
    let satisfaccionVal = 5;
    let efectividadVal = 4;

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(s => { video.srcObject = s; video.play(); })
        .catch(err => { statusText.innerText = "Error: Acceso a cámara denegado."; });

    function setRating(val, el) {
        satisfaccionVal = val;
        document.querySelectorAll('.face').forEach(f => f.classList.remove('active'));
        el.classList.add('active');
    }

    function setEfect(val, el) {
        efectividadVal = val;
        document.querySelectorAll('.btn-efect').forEach(b => {
            b.classList.remove('active');
            b.style = ""; 
        });
        el.classList.add('active');
        // Estilos visuales rápidos de semáforo
        if(val === 1) { el.style.borderColor = "#9C1519"; el.style.background = "#fff5f5"; el.style.color = "#9C1519"; }
        if(val === 2) { el.style.borderColor = "#ffcc00"; el.style.background = "#fffdf0"; el.style.color = "#856404"; }
        if(val === 3) { el.style.borderColor = "#28a745"; el.style.background = "#f0fff4"; el.style.color = "#28a745"; }
        if(val === 4) { el.style.borderColor = "#16a34a"; el.style.background = "#16a34a"; el.style.color = "white"; }
    }

    // Inicializar el botón por defecto visualmente
    setEfect(4, document.getElementById('btnListoDef'));

    function capturar() {
        const c = document.createElement('canvas');
        c.width = 640; c.height = 480;
        c.getContext('2d').drawImage(video, 0, 0, 640, 480);
        imagenB64 = c.toDataURL('image/jpeg', 0.5).split(',')[1];
        preview.src = c.toDataURL('image/jpeg'); preview.style.display = "block"; video.style.display = "none";
        statusText.innerText = "Evidencia capturada.";
    }

    function cargarImagen(e) {
        const r = new FileReader();
        r.onload = () => { 
            imagenB64 = r.result.split(',')[1]; 
            preview.src = r.result; 
            preview.style.display = "block"; 
            video.style.display = "none"; 
        };
        r.readAsDataURL(e.target.files[0]);
    }

    async function enviar() {
        const payload = {
            linea: document.getElementById('linea').value,
            colaborador: document.getElementById('colaborador').value,
            cedula: document.getElementById('codigo').value,
            instructor: document.getElementById('instructor').value,
            tema: document.getElementById('tema').value,
            duracion_min: document.getElementById('tiempo').value,
            satisfaccion: satisfaccionVal,
            autonomia: efectividadVal,
            archivoContenido: imagenB64,
            archivoNombre: `Foto_${document.getElementById('codigo').value}_${Date.now()}.jpg`
        };

        if(!payload.colaborador || !payload.cedula || !payload.tema || !imagenB64) {
            return alert("Por favor completa nombre, cédula, tema y evidencia fotográfica.");
        }

        btnEnviar.disabled = true;
        statusText.innerText = "Sincronizando con Primadera...";

        try {
            const response = await fetch(flowURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert("✅ Registro guardado con éxito.");
                location.reload();
            } else {
                throw new Error();
            }
        } catch (e) {
            alert("Error al guardar. Verifica tu conexión.");
            btnEnviar.disabled = false;
            statusText.innerText = "Error de sincronización.";
        }
    }
</script>
</body>
</html>
